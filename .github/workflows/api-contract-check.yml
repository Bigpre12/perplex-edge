name: api-contract-check

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-contract-check.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-contract-check.yml"

jobs:
  openapi-snapshot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r ../requirements.txt
      - name: Validate OpenAPI snapshot
        id: validate
        env:
          PYTHONPATH: ${{ github.workspace }}/apps/api/src
        run: python scripts/check_openapi_snapshot.py
      - name: Upload Current OpenAPI on Failure
        if: failure() && steps.validate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: openapi-current
          path: apps/api/src/openapi.json # We'll modify the script to dump it here

