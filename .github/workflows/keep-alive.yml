name: Keep Backend Alive

on:
  schedule:
    # Runs every 15 minutes (Railway Hobby sleeps after 30)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://perplex-edge-backend-copy-production.up.railway.app/health)
          echo "Backend returned status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "Warning: Backend might be down or returned an error."
            exit 1
          fi
