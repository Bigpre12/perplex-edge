services:
  - type: web
    name: lucrix-backend
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=src python -m uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
