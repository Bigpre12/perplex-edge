# Railway Hobby Tier Configuration - MAXIMIZED for $5/month credit usage
# Full utilization of 8GB RAM / 8 vCPU limits with proper resource allocation

[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

# Hobby tier resource limits (MAXIMIZED for performance)
[scale]
minInstances = 1
maxInstances = 1

# MAXIMIZED Hobby tier memory and CPU allocation
[resources]
memory = "2048MB"  # 2GB RAM (was 512MB) - Full utilization of headroom
cpu = "1.0"        # 1 full CPU core (was 0.25) - 4x more power

# Enhanced Hobby tier environment variables (MAXIMIZED performance)
[variables]
ENVIRONMENT = "production"
SCHEDULER_ENABLED = "true"
BRAIN_INTERVAL_MIN = "2"      # More responsive (was 10)
LOG_LEVEL = "INFO"

# MAXIMIZED performance optimizations (full headroom utilization)
[variables]
ENABLE_WILDCARD_CORS = "true"
CORS_ORIGINS = "*"
API_RATE_LIMIT = "500"        # Higher limit (was 100)
CACHE_TTL = "300"             # Standard TTL (was 600)
DB_POOL_SIZE = "15"           # Larger pool (was 5)
DB_MAX_OVERFLOW = "30"        # More overflow (was 10)

# Enhanced memory optimization with headroom
[variables]
GC_THRESHOLD = "1000"         # Higher threshold (was 300)
MEMORY_MONITORING = "true"
PERFORMANCE_LOGGING = "true"  # Enable detailed logging
FRONTEND_OPTIMIZATION = "true" # Enable frontend brain
ADVANCED_ANALYTICS = "true"   # Enable heavy analytics

# Enhanced verification and testing capabilities
[variables]
VERIFICATION_SAMPLES = "5000" # Large backtest samples (was 1000)
STRESS_TEST_CYCLES = "1000"   # More stress cycles (was 100)
CONCURRENT_USERS = "50"       # Higher concurrency (was 10)
PARALLEL_PROCESSING = "true"  # Enable parallel processing

# Cost control with better utilization
[variables]
SCHEDULER_USE_STUBS = "false" # Use real API calls with resources
API_QUOTA_MONITORING = "true"
CREDIT_MONITORING = "true"
RESOURCE_OPTIMIZATION = "advanced"

# Brain service enhancements
[variables]
BRAIN_MEMORY_LIMIT = "1536MB" # 1.5GB for brain operations
BRAIN_CPU_LIMIT = "0.8"       # 80% of CPU for brain
BRAIN_PARALLEL_CHECKS = "10"  # Parallel processing
BRAIN_ADVANCED_HEALING = "true"
BRAIN_PREDICTIVE_ANALYSIS = "true"

# Performance monitoring
[variables]
METRICS_ENABLED = "true"
DETAILED_LOGGING = "true"
PERFORMANCE_TRACKING = "true"
MEMORY_PROFILING = "true"
